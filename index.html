<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>雅思课程产品匹配器</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">IELTS Product Match</p>
          <h1 id="page-title">雅思课程产品匹配器</h1>
          <p class="hero-copy">
            输入目前雅思分数、目标分数与学习方式，系统会优先推荐最适合的班课、一对一、冲刺或组合课程，并展示优势、适配原因和价格。
          </p>
        </div>
        <div class="hero-card" aria-label="匹配逻辑说明">
          <span class="hero-card__number">4</span>
          <span>步完成课程推荐</span>
        </div>
      </section>

      <section class="matcher-card" aria-labelledby="form-title">
        <div class="section-heading">
          <p class="eyebrow">Step 1</p>
          <h2 id="form-title">填写学生情况</h2>
        </div>
        <form id="matcher-form" class="matcher-form">
          <label>
            目前雅思总分
            <select id="current-score" name="currentScore" required>
              <option value="4.0">4.0 或以下</option>
              <option value="4.5">4.5</option>
              <option value="5.0" selected>5.0</option>
              <option value="5.5">5.5</option>
              <option value="6.0">6.0</option>
              <option value="6.5">6.5</option>
              <option value="7.0">7.0+</option>
            </select>
          </label>

          <label>
            目标雅思总分
            <select id="target-score" name="targetScore" required>
              <option value="5.5">5.5</option>
              <option value="6.0">6.0</option>
              <option value="6.5" selected>6.5</option>
              <option value="7.0">7.0</option>
              <option value="7.5">7.5+</option>
            </select>
          </label>

          <fieldset>
            <legend>上课方式</legend>
            <label class="radio-card">
              <input type="radio" name="delivery" value="online" checked />
              <span>线上</span>
            </label>
            <label class="radio-card">
              <input type="radio" name="delivery" value="offline" />
              <span>线下</span>
            </label>
            <label class="radio-card">
              <input type="radio" name="delivery" value="hybrid" />
              <span>线上 + 线下</span>
            </label>
          </fieldset>

          <fieldset>
            <legend>更偏好的课程形态</legend>
            <label class="radio-card">
              <input type="radio" name="courseType" value="any" checked />
              <span>不限，自动匹配</span>
            </label>
            <label class="radio-card">
              <input type="radio" name="courseType" value="group" />
              <span>班课</span>
            </label>
            <label class="radio-card">
              <input type="radio" name="courseType" value="oneOnOne" />
              <span>一对一</span>
            </label>
            <label class="radio-card">
              <input type="radio" name="courseType" value="combo" />
              <span>组合课</span>
            </label>
          </fieldset>

          <label>
            备考周期
            <select id="timeline" name="timeline" required>
              <option value="urgent">1 个月内冲刺</option>
              <option value="standard" selected>2-3 个月</option>
              <option value="long">3 个月以上</option>
            </select>
          </label>

          <button type="submit">生成匹配方案</button>
        </form>
      </section>

      <section class="results-section" aria-labelledby="results-title">
        <div class="section-heading">
          <p class="eyebrow">Step 2</p>
          <h2 id="results-title">推荐课程</h2>
          <p id="match-summary" class="muted">已根据默认条件生成推荐，可调整左侧信息重新匹配；价格为产品资料占位展示，以最终报价为准。</p>
        </div>
        <div id="results" class="results-grid" aria-live="polite"></div>
      </section>
    </main>

    <template id="course-card-template">
      <article class="course-card">
        <div class="course-card__header">
          <div>
            <p class="course-type"></p>
            <h3></h3>
          </div>
          <span class="match-score"></span>
        </div>
        <p class="course-desc"></p>
        <dl class="course-meta"></dl>
        <div>
          <h4>优势亮点</h4>
          <ul class="benefits"></ul>
        </div>
        <div>
          <h4>适合情况</h4>
          <p class="fit"></p>
        </div>
        <div class="price-row">
          <span class="price"></span>
          <button type="button" class="consult-button">咨询排课</button>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
